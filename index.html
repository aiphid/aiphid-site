<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ai.phid — coming soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #07070A;
      --lime: #CAFF47;
      --gold: #FFD147;
      --teal: #47FFD4;
      --white: #FFFFFF;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
      pointer-events: none;
    }

    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.65rem, 1.5vw, 0.85rem);
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--teal);
      opacity: 0.85;
      margin-bottom: 1.25rem;
    }

    .wordmark {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: clamp(4rem, 16vw, 12rem);
      line-height: 0.9;
      letter-spacing: -0.03em;
      margin-bottom: 2rem;
      filter: drop-shadow(0 0 40px rgba(202, 255, 71, 0.18));
    }

    .wordmark .ai {
      color: var(--lime);
    }

    .wordmark .dot {
      color: var(--gold);
    }

    .wordmark .phid {
      color: var(--white);
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.75rem, 1.8vw, 1rem);
      font-weight: 400;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.65);
      max-width: 36em;
      margin-bottom: 2.5rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.6em;
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.7rem, 1.4vw, 0.85rem);
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .pulse-dot {
      width: 0.55em;
      height: 0.55em;
      border-radius: 50%;
      background: var(--gold);
      flex-shrink: 0;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 209, 71, 0.5); }
      50% { opacity: 0.7; transform: scale(0.85); box-shadow: 0 0 0 6px rgba(255, 209, 71, 0); }
    }

    .domain {
      position: fixed;
      bottom: 1.75rem;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'DM Mono', monospace;
      font-size: clamp(0.65rem, 1.2vw, 0.8rem);
      font-weight: 500;
      letter-spacing: 0.2em;
      color: rgba(255, 255, 255, 0.25);
      text-transform: lowercase;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="overlay">
    <p class="eyebrow">Augmented Intelligence · Human Identity · Data</p>
    <h1 class="wordmark">
      <span class="ai">ai</span><span class="dot">.</span><span class="phid">phid</span>
    </h1>
    <p class="tagline">
      Augmented intelligence, powered by human identity and data.<br />
      Connecting fans, artists, and venues through experiences that remember you.
    </p>
    <div class="status">
      <span class="pulse-dot"></span>
      Coming soon.
    </div>
  </div>

  <p class="domain">ai.phid</p>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    const COLORS = {
      lime: '#CAFF47',
      gold: '#FFD147',
      teal: '#47FFD4',
    };

    const COLOR_LIST = [COLORS.lime, COLORS.gold, COLORS.teal];

    let W, H, cx, cy;
    let nodes = [];
    let connections = [];
    let animFrame;
    let spawnTimer = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cx = W / 2;
      cy = H / 2;
    }

    class Node {
      constructor(x, y, parent = null, depth = 0) {
        this.x = x;
        this.y = y;
        this.tx = x;
        this.ty = y;
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        this.parent = parent;
        this.depth = depth;
        this.color = COLOR_LIST[Math.floor(Math.random() * COLOR_LIST.length)];
        this.radius = Math.max(2, 5 - depth * 0.6);
        this.alpha = 0;
        this.born = performance.now();
        this.maxChildren = depth < 3 ? Math.floor(Math.random() * 3) + 1 : Math.floor(Math.random() * 2);
        this.childCount = 0;
        this.nextSpawn = this.born + 800 + Math.random() * 2000;
        this.glowIntensity = 0;
        this.glowDir = 1;
        this.dead = false;
      }

      update(now) {
        // fade in
        if (this.alpha < 1) this.alpha = Math.min(1, this.alpha + 0.02);

        // gentle drift
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.995;
        this.vy *= 0.995;

        // subtle oscillation
        const age = (now - this.born) / 1000;
        this.x += Math.sin(age * 0.7 + this.born) * 0.08;
        this.y += Math.cos(age * 0.5 + this.born) * 0.08;

        // glow pulse
        this.glowIntensity += 0.02 * this.glowDir;
        if (this.glowIntensity > 1 || this.glowIntensity < 0) this.glowDir *= -1;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha * 0.9;

        // outer glow
        const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * (6 + this.glowIntensity * 4));
        g.addColorStop(0, this.color + 'CC');
        g.addColorStop(0.3, this.color + '44');
        g.addColorStop(1, this.color + '00');
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * (6 + this.glowIntensity * 4), 0, Math.PI * 2);
        ctx.fillStyle = g;
        ctx.fill();

        // core
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();

        ctx.restore();
      }

      trySpawn(now) {
        if (now < this.nextSpawn) return null;
        if (this.childCount >= this.maxChildren) return null;
        if (this.depth >= 7) return null;

        this.childCount++;
        const angle = Math.random() * Math.PI * 2;
        const dist = 40 + Math.random() * 80;
        const nx = this.x + Math.cos(angle) * dist;
        const ny = this.y + Math.sin(angle) * dist;

        // keep on screen
        if (nx < 0 || nx > W || ny < 0 || ny > H) {
          // reflect angle toward center
          const toCenter = Math.atan2(cy - this.y, cx - this.x);
          const newAngle = toCenter + (Math.random() - 0.5) * Math.PI;
          const child = new Node(
            this.x + Math.cos(newAngle) * dist,
            this.y + Math.sin(newAngle) * dist,
            this, this.depth + 1
          );
          this.nextSpawn = now + 600 + Math.random() * 2500;
          return child;
        }

        this.nextSpawn = now + 600 + Math.random() * 2500;
        return new Node(nx, ny, this, this.depth + 1);
      }
    }

    class Connection {
      constructor(a, b) {
        this.a = a;
        this.b = b;
        this.alpha = 0;
        this.progress = 0;
      }

      update() {
        if (this.progress < 1) this.progress = Math.min(1, this.progress + 0.025);
        if (this.alpha < 1) this.alpha = Math.min(1, this.alpha + 0.015);
      }

      draw() {
        const { a, b } = this;
        const px = a.x + (b.x - a.x) * this.progress;
        const py = a.y + (b.y - a.y) * this.progress;

        ctx.save();
        ctx.globalAlpha = this.alpha * Math.min(a.alpha, b.alpha) * 0.45;

        const g = ctx.createLinearGradient(a.x, a.y, px, py);
        g.addColorStop(0, a.color);
        g.addColorStop(1, b.color);

        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(px, py);
        ctx.strokeStyle = g;
        ctx.lineWidth = 0.8;
        ctx.stroke();

        // traveling particle
        if (this.progress < 1) {
          ctx.beginPath();
          ctx.arc(px, py, 1.5, 0, Math.PI * 2);
          ctx.fillStyle = b.color;
          ctx.globalAlpha = this.alpha;
          ctx.fill();
        }

        ctx.restore();
      }
    }

    function init() {
      nodes = [];
      connections = [];
      // seed node at center
      const root = new Node(cx, cy, null, 0);
      root.alpha = 1;
      nodes.push(root);
    }

    function loop(now) {
      ctx.fillStyle = 'rgba(7, 7, 10, 0.18)';
      ctx.fillRect(0, 0, W, H);

      // update & draw connections
      for (const conn of connections) {
        conn.update();
        conn.draw();
      }

      // update & draw nodes
      const newNodes = [];
      for (const node of nodes) {
        node.update(now);
        node.draw();

        const child = node.trySpawn(now);
        if (child) {
          newNodes.push(child);
          connections.push(new Connection(node, child));
        }
      }

      for (const n of newNodes) nodes.push(n);

      // occasionally draw nearby cross-connections
      if (Math.random() < 0.015 && nodes.length > 5) {
        const a = nodes[Math.floor(Math.random() * nodes.length)];
        const b = nodes[Math.floor(Math.random() * nodes.length)];
        if (a !== b) {
          const d = Math.hypot(a.x - b.x, a.y - b.y);
          if (d < 120 && d > 20) {
            const already = connections.some(c => (c.a === a && c.b === b) || (c.a === b && c.b === a));
            if (!already) connections.push(new Connection(a, b));
          }
        }
      }

      // cap to avoid slowdown
      if (nodes.length > 350) nodes.splice(0, nodes.length - 350);
      if (connections.length > 700) connections.splice(0, connections.length - 700);

      animFrame = requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
      resize();
      // reposition root node to stay centered
      if (nodes.length > 0) {
        nodes[0].x = cx;
        nodes[0].y = cy;
      }
    });

    resize();
    init();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
